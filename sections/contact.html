<section id="contact">
  <div class="section-inner">
    <div class="contact-grid">

      <div class="contact-info">
        <div class="section-heading">
          <span class="section-label">Get in Touch</span>
          <h2 class="section-title">Ready to Book or Have Questions?</h2>
        </div>
        <p>Our team is here to help you find the right provider and get started with Nishalink.</p>
        <div class="contact-detail">
          <div class="icon">📧</div>
          <span>hello@nishalink.com</span>
        </div>
        <div class="contact-detail">
          <div class="icon">📞</div>
          <span>+1 (800) NISHA-LK</span>
        </div>
        <div class="contact-detail">
          <div class="icon">📍</div>
          <span>Available nationwide — remote &amp; in-person</span>
        </div>
      </div>

      <form class="contact-form" onsubmit="handleSubmit(event)">
        <div class="form-row">
          <input type="text" placeholder="First Name" required />
          <input type="text" placeholder="Last Name" required />
        </div>
        <input type="email" placeholder="Email Address" required />
        <input type="tel" placeholder="Phone Number" />
        <select>
          <option value="" disabled selected>Select a Service</option>
          <option>Female Drivers</option>
          <option>Beauticians</option>
          <option>Tutors</option>
          <option>Fitness Trainers</option>
        </select>
        <textarea placeholder="Tell us more about what you need..."></textarea>
        <button type="submit" class="btn btn-primary" style="width:100%;">Send Message</button>
      </form>

    </div>
  </div>
</section>
